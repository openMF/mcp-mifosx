# ============================================================================
# Apache Fineract MCP Server Plugin Configuration
# ============================================================================

# Enable/Disable the MCP Plugin
fineract.mcp.enabled=true

# MCP Server Identity
fineract.mcp.server-name=fineract-mcp-server
fineract.mcp.server-version=1.0.0

# Transport Configuration (SSE for HTTP-based, STDIO for command-line)
fineract.mcp.transport-type=SSE
fineract.mcp.base-path=/mcp

# Security
fineract.mcp.require-auth=true

# Performance
fineract.mcp.max-concurrent-tools=10
fineract.mcp.tool-timeout-seconds=30

# Tool Categories (comma-separated, empty = all enabled)
# Available categories: client, loan, savings, report
fineract.mcp.enabled-tool-categories=

# Spring AI MCP Server Configuration
spring.ai.mcp.server.name=${fineract.mcp.server-name}
spring.ai.mcp.server.version=${fineract.mcp.server-version}
spring.ai.mcp.server.type=SYNC