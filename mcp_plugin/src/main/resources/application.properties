# MCP Plugin Configuration
# This file configures the Spring AI MCP Server embedded within Apache Fineract.
# The plugin runs INSIDE the Fineract JVM — it does NOT make external HTTP calls.

# MCP Transport: Use Streamable HTTP (SSE is deprecated since Spring AI 2.0.0)
spring.ai.mcp.server.protocol=STREAMABLE
spring.ai.mcp.server.type=SYNC

# MCP Server identity
spring.ai.mcp.server.name=mifos-mcp-plugin
spring.ai.mcp.server.version=1.0.0-SNAPSHOT

# Plugin Defaults
# These defaults match the existing java/backoffice implementation behavior.
mcp.plugin.defaults.locale=en
mcp.plugin.defaults.date-format=dd MMMM yyyy
mcp.plugin.defaults.iso-date-format=yyyy-MM-dd
mcp.plugin.defaults.list-clients-page=0
mcp.plugin.defaults.list-clients-size=50
mcp.plugin.defaults.default-office-id=1
mcp.plugin.defaults.default-legal-form-id=1
